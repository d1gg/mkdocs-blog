name: Deploy MkDocs

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build

      - name: Deploy to Uberspace
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.UBERSPACE_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "site/"
          REMOTE_HOST: "lepus.uberspace.de"
          REMOTE_USER: "michel"
          TARGET: "/home/michel/html/"
